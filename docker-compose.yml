services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017" # MongoDB Port
    volumes:
      - mongodb_data:/data/db

volumes:
  qdrant_data:
  mongodb_data:
